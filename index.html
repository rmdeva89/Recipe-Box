<!-- Recipe Box — a personal photo cookbook (standalone version for web hosting) -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#FBF7F0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Recipe Box" />
<title>Recipe Box</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --paper: #FBF7F0;
    --surface: #FFFFFF;
    --ink: #29302B;
    --ink-soft: #6B6F69;
    --herb: #2F6B4F;
    --herb-dark: #244F3B;
    --honey: #E8A23D;
    --line: #ECE6DA;
    --shadow: 0 1px 2px rgba(41,48,43,.06), 0 8px 24px rgba(41,48,43,.08);
    --radius: 18px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  #app { max-width: 720px; margin: 0 auto; padding: 0 16px 120px; }

  header {
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(var(--paper) 72%, rgba(251,247,240,0));
    padding: 22px 0 12px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
  .brand h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: 30px; letter-spacing: -.02em;
    margin: 0; line-height: 1;
  }
  .brand .dot { color: var(--honey); }
  .brand .count {
    font-size: 13px; color: var(--ink-soft); margin-left: auto;
    font-variant-numeric: tabular-nums; padding-bottom: 3px;
  }

  .search { position: relative; display: flex; align-items: center; }
  .search svg { position: absolute; left: 16px; width: 18px; height: 18px; color: var(--ink-soft); pointer-events: none; }
  .search input {
    width: 100%; border: 1px solid var(--line); background: var(--surface);
    border-radius: 999px; padding: 13px 16px 13px 44px;
    font-family: inherit; font-size: 16px; color: var(--ink);
    box-shadow: var(--shadow); outline: none; transition: border-color .15s;
  }
  .search input:focus { border-color: var(--herb); }
  .search input::placeholder { color: var(--ink-soft); }
  .clear-btn {
    position: absolute; right: 8px; border: none; background: var(--line);
    color: var(--ink-soft); width: 26px; height: 26px; border-radius: 999px;
    font-size: 15px; cursor: pointer; display: none; align-items: center; justify-content: center;
  }
  .clear-btn.show { display: flex; }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 8px; }
  @media (min-width: 560px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .card {
    background: var(--surface); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow); cursor: pointer;
    border: 1px solid var(--line); transition: transform .12s ease, box-shadow .12s ease;
    animation: pop .22s ease both;
  }
  .card:active { transform: scale(.97); }
  .card .photo { aspect-ratio: 1 / 1; width: 100%; object-fit: cover; display: block; background: #f0ece3; }
  .card .label { padding: 11px 12px 13px; }
  .card .label .title {
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 16px;
    line-height: 1.2; letter-spacing: -.01em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }

  .state { text-align: center; padding: 64px 24px; color: var(--ink-soft); }
  .state .emoji { font-size: 40px; }
  .state h2 { font-family: 'Fraunces', serif; color: var(--ink); font-weight: 600; font-size: 22px; margin: 14px 0 6px; }
  .state p { margin: 0 auto; max-width: 280px; font-size: 15px; line-height: 1.5; }
  .spinner {
    width: 26px; height: 26px; border: 3px solid var(--line); border-top-color: var(--herb);
    border-radius: 999px; margin: 0 auto; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .fab {
    position: fixed; right: max(20px, calc(50% - 360px + 20px)); bottom: 24px; z-index: 30;
    background: var(--herb); color: #fff; border: none; cursor: pointer;
    height: 56px; padding: 0 22px 0 18px; border-radius: 999px;
    display: flex; align-items: center; gap: 9px;
    font-family: inherit; font-weight: 600; font-size: 16px;
    box-shadow: 0 6px 20px rgba(47,107,79,.38); transition: transform .12s, background .15s;
  }
  .fab:active { transform: scale(.95); }
  .fab svg { width: 20px; height: 20px; }

  .overlay {
    position: fixed; inset: 0; z-index: 40; background: rgba(28,32,29,.42);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .sheet {
    background: var(--paper); width: 100%; max-width: 720px;
    border-radius: 24px 24px 0 0; padding: 8px 20px calc(24px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .26s cubic-bezier(.2,.8,.2,1);
    max-height: 92vh; overflow-y: auto;
  }
  .overlay.open .sheet { transform: none; }
  .grabber { width: 40px; height: 4px; background: var(--line); border-radius: 999px; margin: 8px auto 18px; }
  .sheet h3 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px; margin: 0 0 18px; letter-spacing: -.01em; }

  .drop {
    border: 1.5px dashed #d6cfc0; border-radius: var(--radius); background: var(--surface);
    aspect-ratio: 4 / 3; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; cursor: pointer; color: var(--ink-soft); overflow: hidden; position: relative;
  }
  .drop svg { width: 30px; height: 30px; color: var(--herb); }
  .drop span { font-size: 14px; font-weight: 500; }
  .drop img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .drop .recapture { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,.55); color:#fff; font-size: 12px; padding: 6px 12px; border-radius: 999px; backdrop-filter: blur(4px); }

  .field { margin-top: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-soft); margin-bottom: 7px; }
  .field input {
    width: 100%; border: 1px solid var(--line); background: var(--surface);
    border-radius: 12px; padding: 14px 14px; font-family: inherit; font-size: 16px; color: var(--ink); outline: none;
  }
  .field input:focus { border-color: var(--herb); }

  .actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn {
    flex: 1; border: none; border-radius: 12px; padding: 15px; cursor: pointer;
    font-family: inherit; font-weight: 600; font-size: 16px; transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: var(--herb); color: #fff; }
  .btn-primary:disabled { opacity: .45; cursor: default; }
  .btn-ghost { background: transparent; color: var(--ink-soft); flex: 0 0 auto; padding: 15px 18px; }
  .btn-danger { background: #fbeae6; color: #c0432a; }

  .detail-photo { width: 100%; border-radius: var(--radius); display: block; margin-bottom: 18px; }
  .detail-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 26px; margin: 0 0 4px; letter-spacing: -.01em; }
  .detail-date { font-size: 13px; color: var(--ink-soft); margin: 0 0 22px; }

  .hidden-input { display: none; }
  .toast {
    position: fixed; left: 50%; bottom: 96px; transform: translate(-50%, 20px);
    background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 500; z-index: 60; opacity: 0; transition: all .25s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>

<div id="app">
  <header>
    <div class="brand">
      <h1>Recipe Box<span class="dot">.</span></h1>
      <span class="count" id="count"></span>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Search your recipes" autocomplete="off" />
      <button class="clear-btn" id="clearSearch" aria-label="Clear search">&times;</button>
    </div>
  </header>

  <main id="main">
    <div class="state"><div class="spinner"></div></div>
  </main>
</div>

<button class="fab" id="fab">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
  Add recipe
</button>

<div class="overlay" id="addOverlay">
  <div class="sheet">
    <div class="grabber"></div>
    <h3>Add a recipe</h3>
    <div class="drop" id="drop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 16l5-5 4 4 3-3 6 6"/><circle cx="8.5" cy="8.5" r="1.8"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
      <span>Take or choose a photo</span>
    </div>
    <input class="hidden-input" id="fileInput" type="file" accept="image/*" capture="environment" />
    <div class="field">
      <label for="nameInput">Recipe name</label>
      <input id="nameInput" type="text" placeholder="e.g. Grandma's lemon cake" autocomplete="off" />
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="cancelAdd">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" disabled>Save recipe</button>
    </div>
  </div>
</div>

<div class="overlay" id="detailOverlay">
  <div class="sheet">
    <div class="grabber"></div>
    <div id="detailBody"></div>
    <div class="actions">
      <button class="btn btn-ghost" id="closeDetail">Close</button>
      <button class="btn btn-danger" id="deleteBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const $ = (id) => document.getElementById(id);
  const main = $('main'), countEl = $('count');
  let recipes = [];
  let pendingImage = null;
  let activeId = null;
  let query = '';

  // ---------- on-device storage (IndexedDB) — works on any hosted site ----------
  let _db = null;
  function db() {
    if (_db) return Promise.resolve(_db);
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('recipebox', 1);
      req.onupgradeneeded = () => {
        const d = req.result;
        if (!d.objectStoreNames.contains('recipes')) d.createObjectStore('recipes', { keyPath: 'id' });
      };
      req.onsuccess = () => { _db = req.result; resolve(_db); };
      req.onerror = () => reject(req.error);
    });
  }
  function tx(mode) { return db().then(d => d.transaction('recipes', mode).objectStore('recipes')); }

  async function loadAll() {
    try {
      const store = await tx('readonly');
      const items = await new Promise((resolve, reject) => {
        const r = store.getAll();
        r.onsuccess = () => resolve(r.result || []);
        r.onerror = () => reject(r.error);
      });
      items.sort((a, b) => b.createdAt - a.createdAt);
      recipes = items;
    } catch (e) { recipes = []; console.error('Load failed', e); }
  }
  async function saveRecipe(recipe) {
    try {
      const store = await tx('readwrite');
      await new Promise((resolve, reject) => {
        const r = store.put(recipe);
        r.onsuccess = resolve; r.onerror = () => reject(r.error);
      });
      return true;
    } catch (e) { console.error('Save failed', e); return false; }
  }
  async function removeRecipe(id) {
    try {
      const store = await tx('readwrite');
      await new Promise((resolve, reject) => {
        const r = store.delete(id);
        r.onsuccess = resolve; r.onerror = () => reject(r.error);
      });
      return true;
    } catch (e) { console.error('Delete failed', e); return false; }
  }

  // ---------- image compression ----------
  function compress(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const max = 1200;
          let { width, height } = img;
          if (width > height && width > max) { height = Math.round(height * max / width); width = max; }
          else if (height > max) { width = Math.round(width * max / height); height = max; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---------- rendering ----------
  function fmtDate(ts) {
    return new Date(ts).toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  function render() {
    const filtered = query
      ? recipes.filter(r => r.title.toLowerCase().includes(query.toLowerCase()))
      : recipes;
    countEl.textContent = recipes.length ? recipes.length + (recipes.length === 1 ? ' recipe' : ' recipes') : '';

    if (recipes.length === 0) {
      main.innerHTML = `<div class="state"><div class="emoji">🍳</div><h2>No recipes yet</h2><p>Tap <strong>Add recipe</strong> to snap a photo of your first dish and give it a name.</p></div>`;
      return;
    }
    if (filtered.length === 0) {
      main.innerHTML = `<div class="state"><div class="emoji">🔍</div><h2>Nothing found</h2><p>No recipe matches “${escapeHtml(query)}”. Try a different name.</p></div>`;
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'grid';
    filtered.forEach(r => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<img class="photo" src="${r.image}" alt="${escapeHtml(r.title)}" /><div class="label"><div class="title">${escapeHtml(r.title)}</div></div>`;
      card.addEventListener('click', () => openDetail(r.id));
      grid.appendChild(card);
    });
    main.innerHTML = ''; main.appendChild(grid);
  }

  let toastTimer;
  function toast(msg) {
    const t = $('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 1900);
  }

  // ---------- add flow ----------
  function openAdd() { $('addOverlay').classList.add('open'); }
  function closeAdd() { $('addOverlay').classList.remove('open'); setTimeout(resetAdd, 250); }
  function resetAdd() {
    pendingImage = null; $('nameInput').value = ''; $('fileInput').value = '';
    $('drop').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 16l5-5 4 4 3-3 6 6"/><circle cx="8.5" cy="8.5" r="1.8"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg><span>Take or choose a photo</span>`;
    updateSaveState();
  }
  function updateSaveState() { $('saveBtn').disabled = !(pendingImage && $('nameInput').value.trim()); }

  $('drop').addEventListener('click', () => $('fileInput').click());
  $('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0]; if (!file) return;
    $('drop').innerHTML = `<div class="spinner"></div>`;
    try {
      pendingImage = await compress(file);
      $('drop').innerHTML = `<img src="${pendingImage}" alt="preview" /><div class="recapture">Change photo</div>`;
    } catch (err) { toast('Could not read that image'); resetAdd(); }
    updateSaveState();
  });
  $('nameInput').addEventListener('input', updateSaveState);

  $('saveBtn').addEventListener('click', async () => {
    const title = $('nameInput').value.trim();
    if (!pendingImage || !title) return;
    const recipe = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7), title, image: pendingImage, createdAt: Date.now() };
    $('saveBtn').disabled = true; $('saveBtn').textContent = 'Saving…';
    const ok = await saveRecipe(recipe);
    $('saveBtn').textContent = 'Save recipe';
    if (ok) { recipes.unshift(recipe); render(); closeAdd(); toast('Recipe saved'); }
    else { toast('Save failed — please try again'); updateSaveState(); }
  });

  // ---------- detail flow ----------
  function openDetail(id) {
    const r = recipes.find(x => x.id === id); if (!r) return;
    activeId = id;
    $('detailBody').innerHTML = `<img class="detail-photo" src="${r.image}" alt="${escapeHtml(r.title)}" /><h2 class="detail-title">${escapeHtml(r.title)}</h2><p class="detail-date">Added ${fmtDate(r.createdAt)}</p>`;
    $('detailOverlay').classList.add('open');
  }
  function closeDetail() { $('detailOverlay').classList.remove('open'); activeId = null; }
  $('deleteBtn').addEventListener('click', async () => {
    if (!activeId) return;
    const ok = await removeRecipe(activeId);
    if (ok) { recipes = recipes.filter(r => r.id !== activeId); render(); closeDetail(); toast('Recipe deleted'); }
    else { toast('Could not delete'); }
  });

  // ---------- search ----------
  $('search').addEventListener('input', (e) => {
    query = e.target.value; $('clearSearch').classList.toggle('show', !!query); render();
  });
  $('clearSearch').addEventListener('click', () => {
    query = ''; $('search').value = ''; $('clearSearch').classList.remove('show'); render(); $('search').focus();
  });

  // ---------- wire up ----------
  $('fab').addEventListener('click', openAdd);
  $('cancelAdd').addEventListener('click', closeAdd);
  $('closeDetail').addEventListener('click', closeDetail);
  $('addOverlay').addEventListener('click', (e) => { if (e.target.id === 'addOverlay') closeAdd(); });
  $('detailOverlay').addEventListener('click', (e) => { if (e.target.id === 'detailOverlay') closeDetail(); });

  (async function init() { await loadAll(); render(); })();
</script>
